<!DOCTYPE html>
<!-- Exported by ClickDeck Snapshot. Modifications applied to DOM are preserved. Original source files are not rewritten. -->
<html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIVA 高管IP账号矩阵搭建策略</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --red: #C4001C;
  --red-light: #FCE8EB;
  --red-dark: #8A0013;
  --red-soft: #FFCCD5;
  --red-deep: #5C000E;
  --black: #111111;
  --gray: #555555;
  --gray-light: #F8F8F8;
  --gray-mid: #E8E8E8;
  --gray-dark: #D0D0D0;
  --white: #FFFFFF;
  --table-bg: #FFFFFF;
  --table-alt: #F5F5F5;
}
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  color: var(--black);
  background: var(--white);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== 顶部固定导航 ===== */
.top-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  border-bottom: 1px solid rgba(196,0,28,0.08);
  padding: 0 32px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.top-nav .nav-brand {
  font-size: 16px;
  font-weight: 800;
  color: var(--red);
  letter-spacing: 1px;
  white-space: nowrap;
}
.top-nav .nav-links {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding-right: 8px;
}
.top-nav .nav-links::-webkit-scrollbar { display: none; }
.top-nav .nav-links a {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 100px;
  text-decoration: none;
  color: var(--gray);
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s ease;
  white-space: nowrap;
  flex-shrink: 0;
}
.top-nav .nav-links a:hover {
  background: var(--red-light);
  color: var(--red);
}
.top-nav .nav-links a.active {
  background: var(--red);
  color: var(--white);
  font-weight: 600;
  box-shadow: 0 2px 8px rgba(196,0,28,0.25);
}
.top-nav .nav-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(196,0,28,0.1);
  color: var(--red);
  font-size: 12px;
  font-weight: 700;
}
.top-nav .nav-links a.active .nav-num {
  background: rgba(255,255,255,0.2);
  color: var(--white);
}

/* ===== 分屏 ===== */
.section {
  min-height: 100vh;
  width: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 100px 48px 80px;
  position: relative;
  overflow: hidden;
}
.section-compact {
  min-height: auto;
  padding: 80px 48px;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
}

/* 编号 */
.section-num {
  font-size: 18px;
  font-weight: 700;
  color: var(--red);
  letter-spacing: 3px;
  margin-bottom: 16px;
  text-transform: uppercase;
}

/* 标题 */
h2.section-title {
  font-size: 44px;
  font-weight: 800;
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -0.5px;
}
h3.block-title {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--black);
}
h4.sub-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 12px;
  color: var(--red);
}

/* 文本 */
.lead {
  font-size: 20px;
  color: var(--gray);
  line-height: 1.7;
  margin-bottom: 40px;
  max-width: 720px;
}
.p-short {
  font-size: 17px;
  line-height: 1.8;
  color: var(--gray);
  margin-bottom: 0;
}

/* ===== 卡片 ===== */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
}
.card-grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
.card-grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
.card {
  background: var(--white);
  border: 1px solid var(--gray-mid);
  border-radius: 16px;
  padding: 36px;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--red);
  transform: scaleX(0);
  transition: transform 0.35s ease;
  border-radius: 16px 16px 0 0;
}
.card:hover::before {
  transform: scaleX(1);
}
.card:hover {
  border-color: var(--red-soft);
  transform: translateY(-5px);
  box-shadow: 0 20px 50px rgba(196,0,28,0.1);
}
.card-red {
  background: var(--red);
  color: var(--white);
  border: none;
}
.card-red::before { display: none; }
.card-red:hover {
  transform: translateY(-5px);
  box-shadow: 0 20px 50px rgba(196,0,28,0.3);
}
.card-red h3, .card-red h4, .card-red p { color: var(--white); }
.card-red .card-icon { color: var(--white); }
.card-light {
  background: var(--red-light);
  border: none;
}
.card-light::before { display: none; }
.card-icon {
  font-size: 36px;
  margin-bottom: 18px;
  color: var(--red);
}
.card-num {
  font-size: 48px;
  font-weight: 800;
  color: var(--red);
  opacity: 0.15;
  line-height: 1;
  margin-bottom: 8px;
}
.card-red .card-num { color: var(--white); opacity: 0.25; }

/* 编号角标 */
.corner-num {
  position: absolute;
  top: 20px; right: 24px;
  font-size: 42px;
  font-weight: 800;
  color: var(--red);
  opacity: 0.08;
  line-height: 1;
}
.card-red .corner-num { color: var(--white); opacity: 0.15; }

/* ===== 列表 ===== */
.ul-clean {
  list-style: none;
  padding: 0;
}
.ul-clean li {
  padding: 12px 0;
  border-bottom: 1px solid #f0f0f0;
  font-size: 17px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  line-height: 1.6;
}
.ul-clean li:last-child { border-bottom: none; }
.ul-clean li::before {
  content: '▸';
  color: var(--red);
  font-weight: 700;
  flex-shrink: 0;
  font-size: 17px;
}

/* ===== 表格 ===== */
.table-wrap {
  overflow-x: auto;
  margin: 28px 0;
  border-radius: 14px;
  border: 1px solid var(--gray-mid);
  background: var(--table-bg);
}
.table-style {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 16px;
}
.table-style th {
  background: var(--gray-dark);
  color: var(--black);
  padding: 18px 20px;
  text-align: left;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.5px;
  border-bottom: 2px solid var(--red);
  white-space: nowrap;
}
.table-style th:first-child { border-radius: 14px 0 0 0; }
.table-style th:last-child { border-radius: 0 14px 0 0; }
.table-style td {
  padding: 18px 20px;
  border-bottom: 1px solid var(--gray-mid);
  vertical-align: top;
  line-height: 1.7;
  color: var(--black);
}
.table-style td strong {
  color: var(--black);
  font-weight: 700;
}
.table-style tr:last-child td { border-bottom: none; }
.table-style tr:last-child td:first-child { border-radius: 0 0 0 14px; }
.table-style tr:last-child td:last-child { border-radius: 0 0 14px 0; }
.table-style tr:nth-child(even) { background: var(--table-alt); }
.table-style tr:hover { background: var(--red-light) !important; transition: background 0.2s; }

/* ===== 引用块 ===== */
.quote-block {
  border-left: 4px solid var(--red);
  padding: 24px 32px;
  background: var(--red-light);
  margin: 32px 0;
  font-size: 20px;
  font-weight: 600;
  color: var(--red-dark);
  border-radius: 0 14px 14px 0;
}

/* ===== 数据高亮 ===== */
.stat-highlight {
  display: inline-flex;
  align-items: baseline;
  gap: 4px;
}
.stat-big {
  font-size: 56px;
  font-weight: 800;
  color: var(--red);
  line-height: 1;
}
.stat-unit {
  font-size: 24px;
  font-weight: 700;
  color: var(--red);
}
.stat-label-inline {
  font-size: 16px;
  color: var(--gray);
  margin-left: 4px;
}

/* ===== 时间线 ===== */
.timeline {
  position: relative;
  padding-left: 30px;
  border-left: 2px solid var(--red-soft);
  margin: 24px 0;
}
.timeline-item {
  position: relative;
  padding-bottom: 32px;
}
.timeline-item::before {
  content: '';
  position: absolute;
  left: -36px;
  top: 2px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--red);
  border: 3px solid var(--white);
  box-shadow: 0 0 0 2px var(--red-soft);
}
.timeline-item:last-child { padding-bottom: 0; }
.timeline-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
}
.timeline-desc {
  font-size: 16px;
  color: var(--gray);
  line-height: 1.7;
}

/* ===== 标签 ===== */
.tag {
  display: inline-block;
  padding: 6px 16px;
  background: var(--red-light);
  color: var(--red);
  font-size: 14px;
  font-weight: 600;
  border-radius: 100px;
  margin: 3px 4px 3px 0;
  transition: all 0.2s ease;
}
.tag:hover {
  transform: scale(1.05);
  box-shadow: 0 2px 8px rgba(196,0,28,0.15);
}
.tag-white {
  background: var(--white);
  color: var(--red);
}
.tag-outline {
  background: transparent;
  border: 1.5px solid var(--red);
}

/* ===== 分栏 ===== */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}
.three-col {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

/* ===== 背景 ===== */
.bg-red { background: var(--red); color: var(--white); }
.bg-red h1, .bg-red h2, .bg-red h3, .bg-red p { color: var(--white); }
.bg-red .section-num { color: rgba(255,255,255,0.6); }
.bg-red .card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); }
.bg-red .card h3, .bg-red .card p { color: var(--white); }
.bg-red .card-icon { color: var(--white); }
.bg-red .card-num { color: var(--white); opacity: 0.2; }
.bg-red .quote-block { background: rgba(255,255,255,0.12); border-left-color: var(--white); color: var(--white); }
.bg-light { background: var(--gray-light); }
.bg-red-light { background: var(--red-light); }
.bg-gradient {
  background: linear-gradient(135deg, var(--white) 0%, var(--red-light) 50%, var(--white) 100%);
}

/* ===== 封面 ===== */
.cover {
  text-align: center;
  justify-content: center;
  align-items: center;
  background: linear-gradient(160deg, var(--white) 0%, var(--red-light) 40%, var(--white) 100%);
  position: relative;
}
.cover .badge {
  display: inline-block;
  padding: 10px 28px;
  background: var(--red);
  color: var(--white);
  font-size: 15px;
  font-weight: 700;
  border-radius: 100px;
  margin-bottom: 32px;
  letter-spacing: 2px;
  box-shadow: 0 4px 16px rgba(196,0,28,0.25);
}
.cover h1 {
  font-size: 76px;
  font-weight: 900;
  line-height: 1.08;
  margin-bottom: 24px;
  letter-spacing: -2px;
}
.cover .subtitle {
  font-size: 26px;
  color: var(--gray);
  margin-bottom: 44px;
  font-weight: 400;
}
.cover .meta {
  display: flex;
  justify-content: center;
  gap: 32px;
  font-size: 15px;
  color: var(--gray);
  flex-wrap: wrap;
}
.cover .meta-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  background: rgba(255,255,255,0.8);
  border-radius: 100px;
  border: 1px solid var(--gray-mid);
}

/* 封面装饰 */
.cover::before {
  content: '';
  position: absolute;
  top: -15%;
  right: -8%;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--red-soft) 0%, transparent 70%);
  opacity: 0.5;
  pointer-events: none;
}
.cover::after {
  content: '';
  position: absolute;
  bottom: -20%;
  left: -10%;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--red-soft) 0%, transparent 70%);
  opacity: 0.3;
  pointer-events: none;
}

/* ===== 总结流程 ===== */
.summary-flow {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  margin: 36px 0;
}
.summary-node {
  padding: 16px 24px;
  background: var(--white);
  border: 2px solid var(--red);
  border-radius: 14px;
  font-weight: 700;
  font-size: 16px;
  text-align: center;
  box-shadow: 0 4px 16px rgba(196,0,28,0.06);
  transition: all 0.3s ease;
}
.summary-node:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(196,0,28,0.12);
}
.summary-arrow {
  color: var(--red);
  font-size: 24px;
  font-weight: 800;
}

/* ===== 阶段卡片 ===== */
.phase-card {
  padding: 32px;
  border-radius: 16px;
  background: var(--white);
  border: 2px solid var(--gray-mid);
  position: relative;
  transition: all 0.3s ease;
}
.phase-card:hover {
  border-color: var(--red-soft);
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(196,0,28,0.08);
}
.phase-card.active {
  border-color: var(--red);
  box-shadow: 0 8px 32px rgba(196,0,28,0.12);
}
.phase-tag {
  position: absolute;
  top: -12px;
  left: 22px;
  padding: 5px 16px;
  background: var(--red);
  color: var(--white);
  font-size: 13px;
  font-weight: 700;
  border-radius: 100px;
  letter-spacing: 0.5px;
}

/* ===== 角色卡片 ===== */
.role-card {
  display: flex;
  gap: 18px;
  align-items: flex-start;
  padding: 24px;
  border-radius: 14px;
  background: var(--white);
  border: 1px solid var(--gray-mid);
  margin-bottom: 16px;
  transition: all 0.3s ease;
}
.role-card:hover {
  border-color: var(--red-soft);
  box-shadow: 0 8px 24px rgba(196,0,28,0.06);
}
.role-avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--red-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  color: var(--red);
  font-weight: 700;
}
.role-body h4 { font-size: 18px; margin-bottom: 8px; }
.role-body p { font-size: 16px; color: var(--gray); line-height: 1.7; }

/* ===== 分隔线 ===== */
.section-divider {
  height: 4px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
  opacity: 0.3;
  margin: 0;
}

/* ===== 动画 ===== */
.reveal {
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
}
.reveal.active {
  opacity: 1;
  transform: translateY(0);
}
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }
.reveal-delay-5 { transition-delay: 0.5s; }

.count-up {
  font-variant-numeric: tabular-nums;
}

/* ===== 窄屏适配 ===== */
@media (max-width: 768px) {
  .top-nav { padding: 0 12px; height: 52px; }
  .top-nav .nav-brand { font-size: 14px; }
  .top-nav .nav-links a { padding: 5px 10px; font-size: 12px; }
  .section { padding: 80px 20px 48px; }
  .cover h1 { font-size: 42px; }
  h2.section-title { font-size: 30px; }
  h3.block-title { font-size: 22px; }
  .card-grid-4, .card-grid-3, .two-col, .three-col { grid-template-columns: 1fr; }
  .summary-flow { flex-direction: column; gap: 8px; }
  .summary-arrow { transform: rotate(90deg); }
  .cover .meta { gap: 8px; }
  .table-style { font-size: 14px; }
  .table-style th, .table-style td { padding: 12px 14px; }
  .p-short { font-size: 15px; }
}

@media (max-width: 1024px) and (min-width: 769px) {
  .card-grid-4 { grid-template-columns: repeat(2, 1fr); }
  .top-nav { padding: 0 20px; }
  .table-style { font-size: 15px; }
}

/* 特殊：竞品案例的分级标签 */
.level-tag {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  margin-right: 8px;
}
.level-tag.core { background: var(--red); color: var(--white); }
.level-tag.important { background: var(--red-light); color: var(--red); }
.level-tag.detail { background: var(--gray-light); color: var(--gray); }

/* 迷你标签组 */
.mini-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}
.mini-tag {
  padding: 4px 12px;
  background: var(--red-light);
  color: var(--red);
  font-size: 13px;
  font-weight: 600;
  border-radius: 100px;
}

/* 大号标题卡片 */
.hero-card {
  padding: 48px;
  border-radius: 18px;
  background: var(--white);
  border: 2px solid var(--red);
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero-card::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle, var(--red-soft) 0%, transparent 60%);
  opacity: 0.3;
  pointer-events: none;
}
.hero-card h3 {
  font-size: 32px;
  font-weight: 800;
  color: var(--red);
  margin-bottom: 14px;
  position: relative;
}
.hero-card p {
  font-size: 20px;
  color: var(--gray);
  position: relative;
}

/* 四列等宽卡片 */
.equal-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}
.equal-4 .card { padding: 28px; }
.equal-4 .card h3 { font-size: 18px; }
.equal-4 .card p { font-size: 15px; }

/* 底部强调条 */
.bottom-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-top: 32px;
}
.bottom-bar .card {
  padding: 28px;
  text-align: center;
}
.bottom-bar .card-icon { font-size: 28px; margin-bottom: 12px; }
.bottom-bar .card h4 { font-size: 16px; margin-bottom: 8px; }
.bottom-bar .card p { font-size: 15px; }

/* 进度指示器 */
.progress-dots {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin: 16px 0;
}
.progress-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--gray-mid);
}
.progress-dot.active {
  background: var(--red);
  box-shadow: 0 0 0 3px var(--red-light);
}

/* 窄表格 */
.table-compact td, .table-compact th {
  padding: 12px 14px;
  font-size: 15px;
}

/* 红色边框卡片 */
.card-red-border {
  border: 2px solid var(--red);
  background: var(--red-light);
}

/* 失败案例红色卡片 */
.fail-card {
  border: 2px solid var(--red);
  background: var(--red-light);
  padding: 32px;
  border-radius: 14px;
  margin-top: 16px;
}
.fail-card h4 { color: var(--red); }
.fail-card p { color: var(--black); font-size: 16px; line-height: 1.8; }

/* 编号卡片 */
.num-card {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.num-badge {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--red);
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  flex-shrink: 0;
}

/* 表格内小标签 */
.td-tag {
  display: inline-block;

<script>
// ===== 滚动揭示动画 =====
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('active');
      const counters = entry.target.querySelectorAll('.count-up');
      counters.forEach(counter => {
        if (!counter.classList.contains('counted')) {
          counter.classList.add('counted');
          animateCounter(counter);
        }
      });
    }
  });
}, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });

document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

function animateCounter(el) {
  const target = parseInt(el.getAttribute('data-target'));
  const duration = 1500;
  const start = performance.now();
  function update(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
    el.textContent = Math.floor(eased * target);
    if (progress < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

// ===== 导航高亮 =====
const sections = document.querySelectorAll('section[id]');
const navLinks = document.querySelectorAll('.nav-link');

const navObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.getAttribute('id');
      navLinks.forEach(link => {
        link.classList.toggle('active', link.getAttribute('href') === '#' + id);
      });
    }
  });
}, { threshold: 0.25, rootMargin: '-56px 0px 0px 0px' });

sections.forEach(section => navObserver.observe(section));

// ===== 平滑滚动 =====
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function(e) {
    e.preventDefault();
    const target = document.querySelector(this.getAttribute('href'));
    if (target) {
      const top = target.getBoundingClientRect().top + window.pageYOffset - 56;
      window.scrollTo({ top: top, behavior: 'smooth' });
    }
  });
});

// ===== 导航滚动隐藏/显示 =====
let lastScrollY = window.scrollY;
const topNav = document.getElementById('topNav');
window.addEventListener('scroll', () => {
  const currentScrollY = window.scrollY;
  if (currentScrollY > lastScrollY && currentScrollY > 200) {
    topNav.style.transform = 'translateY(-100%)';
  } else {
    topNav.style.transform = 'translateY(0)';
  }
  lastScrollY = currentScrollY;
}, { passive: true });

// ===== 样式面板 =====
const editorBtn = document.getElementById('editorBtn');
const editorPanel = document.getElementById('editorPanel');
const editModeIndicator = document.getElementById('editModeIndicator');
const exportOverlay = document.getElementById('exportOverlay');
const exportTextarea = document.getElementById('exportTextarea');
const btnCopyExport = document.getElementById('btnCopyExport');
const btnCloseExport = document.getElementById('btnCloseExport');

let editMode = false;
let textEdits = {};

// 切换面板
editorBtn.addEventListener('click', () => {
  editorPanel.classList.toggle('open');
  editorBtn.classList.toggle('active');
});

// 样式变量映射
const styleMap = {
  'inp-radius': { prop: '--card-radius', selector: '.card', css: 'borderRadius', display: 'val-radius' },
  'inp-border': { prop: '--card-border', selector: '.card', css: 'borderWidth', display: 'val-border' },
  'inp-body': { prop: '--body-size', selector: '.p-short', css: 'fontSize', display: 'val-body' },
  'inp-title': { prop: '--title-size', selector: 'h2.section-title', css: 'fontSize', display: 'val-title' },
  'inp-subtitle': { prop: '--subtitle-size', selector: 'h3.block-title', css: 'fontSize', display: 'val-subtitle' },
  'inp-num': { prop: '--num-size', selector: '.section-num', css: 'fontSize', display: 'val-num' },
  'inp-padding': { prop: '--card-padding', selector: '.card', css: 'padding', display: 'val-padding' },
  'inp-section': { prop: '--section-padding', selector: '.section', css: 'paddingBottom', display: 'val-section' },
  'inp-gap': { prop: '--grid-gap', selector: '.card-grid, .card-grid-3, .card-grid-4, .equal-4', css: 'gap', display: 'val-gap' },
};

// 实时应用样式
Object.keys(styleMap).forEach(id => {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('input', (e) => {
    const cfg = styleMap[id];
    const val = e.target.value + (e.target.dataset.unit || 'px');
    document.getElementById(cfg.display).textContent = val;
    // 应用到CSS变量
    document.documentElement.style.setProperty(cfg.prop, val);
    // 直接应用到元素
    document.querySelectorAll(cfg.selector).forEach(el => {
      el.style[cfg.css] = val;
    });
  });
});

// 颜色
const inpRed = document.getElementById('inp-red');
if (inpRed) {
  inpRed.addEventListener('input', (e) => {
    const val = e.target.value;
    document.documentElement.style.setProperty('--red', val);
    const r = parseInt(val.slice(1,3), 16);
    const g = parseInt(val.slice(3,5), 16);
    const b = parseInt(val.slice(5,7), 16);
    document.documentElement.style.setProperty('--red-light', `rgba(${r},${g},${b},0.08)`);
    document.documentElement.style.setProperty('--red-soft', `rgba(${r},${g},${b},0.2)`);
    document.documentElement.style.setProperty('--red-dark', `rgba(${r},${g},${b},0.85)`);
  });
}

const inpBg = document.getElementById('inp-bg');
if (inpBg) {
  inpBg.addEventListener('input', (e) => {
    document.body.style.background = e.target.value;
  });
}

// 重置
const btnReset = document.getElementById('btnReset');
if (btnReset) {
  btnReset.addEventListener('click', () => {
    document.documentElement.style.cssText = '';
    document.body.style.cssText = '';
    document.querySelectorAll('.card').forEach(el => {
      el.style.borderRadius = '';
      el.style.borderWidth = '';
      el.style.padding = '';
    });
    document.querySelectorAll('.p-short').forEach(el => el.style.fontSize = '');
    document.querySelectorAll('h2.section-title').forEach(el => el.style.fontSize = '');
    document.querySelectorAll('h3.block-title').forEach(el => el.style.fontSize = '');
    document.querySelectorAll('.section-num').forEach(el => el.style.fontSize = '');
    document.querySelectorAll('.section').forEach(el => el.style.paddingBottom = '');
    document.querySelectorAll('.card-grid, .card-grid-3, .card-grid-4, .equal-4').forEach(el => el.style.gap = '');
    Object.keys(styleMap).forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.value = el.defaultValue;
        const cfg = styleMap[id];
        document.getElementById(cfg.display).textContent = el.value + (el.dataset.unit || 'px');
      }
    });
    if (inpRed) inpRed.value = '#C4001C';
    if (inpBg) inpBg.value = '#FFFFFF';
  });
}

// ===== 文字编辑模式 =====
const btnEditMode = document.getElementById('btnEditMode');
if (btnEditMode) {
  btnEditMode.addEventListener('click', () => {
    editMode = !editMode;
    if (editMode) {
      btnEditMode.textContent = '✅ 退出文字编辑模式';
      editModeIndicator.classList.add('show');
      enableTextEditing();
    } else {
      btnEditMode.textContent = '📝 进入文字编辑模式';
      editModeIndicator.classList.remove('show');
      disableTextEditing();
    }
  });
}

if (editModeIndicator) {
  editModeIndicator.addEventListener('click', () => {
    if (btnEditMode) btnEditMode.click();
  });
}

function enableTextEditing() {
  const textSelectors = 'p, h1, h2, h3, h4, li, td, th, .section-title, .block-title, .sub-title, .p-short, .lead, .quote-block';
  document.querySelectorAll(textSelectors).forEach(el => {
    if (el.closest('.editor-panel') || el.closest('.editor-panel-btn') || el.closest('.export-overlay')) return;
    if (!el.children.length || el.children.length === 0) {
      el.classList.add('editable-text');
      el.dataset.originalText = el.textContent;
    }
  });
}

function disableTextEditing() {
  document.querySelectorAll('.editable-text').forEach(el => {
    el.classList.remove('editable-text', 'editing');
    el.contentEditable = 'false';
  });
}

// 双击编辑
document.addEventListener('dblclick', (e) => {
  if (!editMode) return;
  const target = e.target;
  if (target.closest('.editor-panel') || target.closest('.editor-panel-btn') || target.closest('.export-overlay')) return;
  let el = target;
  while (el && el !== document.body) {
    if (el.classList.contains('editable-text')) {
      startEdit(el);
      break;
    }
    el = el.parentElement;
  }
});

function startEdit(el) {
  if (el.classList.contains('editing')) return;
  el.classList.add('editing');
  el.contentEditable = 'true';
  el.focus();
  const path = getElementPath(el);

  const save = () => {
    el.classList.remove('editing');
    el.contentEditable = 'false';
    const newText = el.textContent.trim();
    if (newText !== el.dataset.originalText) {
      textEdits[path] = newText;
      el.dataset.originalText = newText;
      el.style.background = 'rgba(196,0,28,0.05)';
    }
    el.removeEventListener('blur', save);
    el.removeEventListener('keydown', onKey);
  };

  const onKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      el.blur();
    } else if (e.key === 'Escape') {
      el.textContent = el.dataset.originalText;
      el.blur();
    }
  };

  el.addEventListener('blur', save);
  el.addEventListener('keydown', onKey);
}

function getElementPath(el) {
  const path = [];
  let current = el;
  while (current && current.tagName !== 'BODY') {
    let tag = current.tagName.toLowerCase();
    if (current.id) {
      tag += '#' + current.id;
      path.unshift(tag);
      break;
    }
    const cls = current.className ? current.className.split(' ').filter(c => c && !c.includes('editable')).join('.') : '';
    if (cls) tag += '.' + cls;
    const siblings = Array.from(current.parentElement?.children || []);
    const sameTag = siblings.filter(s => s.tagName === current.tagName);
    if (sameTag.length > 1) {
      const idx = sameTag.indexOf(current) + 1;
      tag += `:nth-of-type(${idx})`;
    }
    path.unshift(tag);
    current = current.parentElement;
  }
  return path.join(' > ');
}

// ===== 导出 =====
function showExport(title, text) {
  document.getElementById('exportTitle').textContent = title;
  exportTextarea.value = text;
  exportOverlay.classList.add('show');
}

if (btnCloseExport) {
  btnCloseExport.addEventListener('click', () => {
    exportOverlay.classList.remove('show');
  });
}

if (btnCopyExport) {
  btnCopyExport.addEventListener('click', () => {
    exportTextarea.select();
    document.execCommand('copy');
    btnCopyExport.textContent = '✅ 已复制！';
    setTimeout(() => { btnCopyExport.textContent = '📋 复制到剪贴板'; }, 2000);
  });
}

// 导出 CSS 变量
const btnExportCSS = document.getElementById('btnExportCSS');
if (btnExportCSS) {
  btnExportCSS.addEventListener('click', () => {
    let css = ':root {\n';
    Object.keys(styleMap).forEach(id => {
      const el = document.getElementById(id);
      if (el && el.value !== el.defaultValue) {
        const cfg = styleMap[id];
        const val = el.value + (el.dataset.unit || 'px');
        css += `  ${cfg.prop}: ${val};\n`;
      }
    });
    if (inpRed && inpRed.value !== '#C4001C') {
      css += `  --red: ${inpRed.value};\n`;
    }
    if (inpBg && inpBg.value !== '#FFFFFF') {
      css += `  --bg: ${inpBg.value};\n`;
    }
    css += '}';
    if (css === ':root {\n}') {
      css = '/* 未做任何样式修改，请调整滑块后再导出 */';
    }
    showExport('📋 CSS 变量（粘贴给我即可）', css);
  });
}

// 导出 HTML 修改
const btnExportHTML = document.getElementById('btnExportHTML');
if (btnExportHTML) {
  btnExportHTML.addEventListener('click', () => {
    if (Object.keys(textEdits).length === 0) {
      showExport('⚠️ 未修改文字', '你还没有修改任何文字内容。请进入文字编辑模式，双击页面文字修改后，再导出。');
      return;
    }
    let html = '<!-- 文字修改记录 -->\n';
    Object.entries(textEdits).forEach(([path, text]) => {
      html += `<div data-path="${path}">${text}</div>\n`;
    });
    showExport('📋 HTML 文字修改（粘贴给我即可）', html);
  });
}

// 点击遮罩关闭
if (exportOverlay) {
  exportOverlay.addEventListener('click', (e) => {
    if (e.target === exportOverlay) exportOverlay.classList.remove('show');
  });
}

// 面板外点击关闭
let panelOpen = false;
if (editorBtn) {
  editorBtn.addEventListener('click', () => { panelOpen = !panelOpen; });
}
document.addEventListener('click', (e) => {
  if (!panelOpen) return;
  if (e.target.closest('.editor-panel') || e.target === editorBtn) return;
  editorPanel.classList.remove('open');
  editorBtn.classList.remove('active');
  panelOpen = false;
});
</script>

  <div class="editor-group">
    <label>分屏间距 <span class="value-display" id="val-section">80px</span></label>
    <input type="range" id="inp-section" min="40" max="150" value="80" data-unit="px">
  </div>

  <div class="editor-group">
    <label>卡片间距 <span class="value-display" id="val-gap">24px</span></label>
    <input type="range" id="inp-gap" min="8" max="48" value="24" data-unit="px">
  </div>

  <div class="editor-group">
    <label>主色调红色</label>
    <input type="color" id="inp-red" value="#C4001C">
  </div>

  <div class="editor-group">
    <label>页面背景</label>
    <input type="color" id="inp-bg" value="#FFFFFF">
  </div>

  <button class="editor-btn" id="btnReset">↺ 重置所有样式</button>

  <h3 style="margin-top:20px;">✏️ 文字编辑</h3>
  <button class="editor-btn" id="btnEditMode">📝 进入文字编辑模式</button>
  <div class="editor-hint">
    <strong>文字编辑模式：</strong>双击页面上的任何文字即可直接修改。按 Enter 保存，按 Esc 取消。修改后点击「导出修改」获取更新后的文件。
  </div>

  <h3 style="margin-top:20px;">📤 导出</h3>
  <button class="editor-btn" id="btnExportCSS">📋 复制 CSS 变量</button>
  <button class="editor-btn secondary" id="btnExportHTML">📋 复制 HTML 片段</button>
  <div class="editor-hint">
    将复制的 CSS 或 HTML 粘贴给我，我即可合并到源码中重新部署。链接完全不变。
  </div>
</div>

<div class="editor-mode-indicator" id="editModeIndicator">
  ✏️ 文字编辑模式已开启（双击任意文字修改）
</div>

<div class="export-overlay" id="exportOverlay">
  <div class="export-modal">
    <h3 id="exportTitle">导出代码</h3>
    <textarea id="exportTextarea" readonly></textarea>
    <button class="editor-btn" id="btnCopyExport">📋 复制到剪贴板</button>
    <button class="editor-btn secondary" id="btnCloseExport">关闭</button>
  </div>
</div>

</body></html>
